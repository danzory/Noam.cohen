        function setTab(tabName) {

            render();

        function updateExerciseDetails(exName) {
            selectedProgressExercise = exName;
            const exProgress = progressData.strength.find(d => d.exercise === exName);
            if (!exProgress) return;
            
            const container = document.getElementById('exerciseDetailsContent');
            if(container) {
                let currentWeightDisplay = exProgress.current;
                let prevWeightDisplay = exProgress.prev;
                
                // טיפול במשקל גוף למקבילים או אפסים
                if(exProgress.exercise === 'מקבילים') {
                    currentWeightDisplay = exProgress.current > 0 ? `+${exProgress.current} ק"ג` : `${exProgress.current} ק"ג`;
                    prevWeightDisplay = exProgress.prev < 0 ? `${exProgress.prev} ק"ג` : `${exProgress.prev} ק"ג`;
                } else {
                    currentWeightDisplay = currentWeightDisplay > 0 ? currentWeightDisplay + ' ק"ג' : '-';

                }

            </div>`;
        }

        // --- פונקציות המחשבון ---
        function initCalculator() {
            const sourceFoodSelect = document.getElementById('sourceFood');
            const targetFoodSelect = document.getElementById('targetFood');
            const sourceAmountInput = document.getElementById('sourceAmount');
            const matchCriteriaSelect = document.getElementById('matchCriteria');
            
            if(!sourceFoodSelect) return;

            // מילוי הרשימות
            sourceFoodSelect.innerHTML = '';
            targetFoodSelect.innerHTML = '';
            
            Object.keys(foodData).forEach(key => {
                sourceFoodSelect.innerHTML += `<option value="${key}">${key}</option>`;
                targetFoodSelect.innerHTML += `<option value="${key}">${key}</option>`;
            });
            
            // ברירות מחדל הגיוניות למסה
            sourceFoodSelect.value = 'חזה עוף';
            targetFoodSelect.value = 'סלמון';

            const calculate = () => {
                const comparisonResultDiv = document.getElementById('comparisonResult');
                const sourceFoodKey = sourceFoodSelect.value;
                const sourceAmount = parseFloat(sourceAmountInput.value);
                const targetFoodKey = targetFoodSelect.value;
                const criteria = matchCriteriaSelect.value;

                if (!sourceFoodKey || !targetFoodKey || !sourceAmount || sourceAmount <= 0) {
                    comparisonResultDiv.classList.add('hidden');
                    return;
                }

                const sourceFood = foodData[sourceFoodKey];
                const targetFood = foodData[targetFoodKey];
                const sourceNutrientPer100g = sourceFood[criteria];
                const targetNutrientPer100g = targetFood[criteria];

                if (targetNutrientPer100g === 0) {
                    comparisonResultDiv.innerHTML = `<p class="text-red-400 font-bold text-sm">לא ניתן להשוות. למאכל החלופי אין ערך עבור פרמטר זה.</p>`;
                    comparisonResultDiv.classList.remove('hidden');
                    return;
                }

                const totalSourceNutrient = (sourceAmount / 100) * sourceNutrientPer100g;
                const requiredTargetAmount = (totalSourceNutrient / targetNutrientPer100g) * 100;
                
                const targetCalories = (requiredTargetAmount / 100) * targetFood.calories;
                const targetProtein = (requiredTargetAmount / 100) * targetFood.protein;
                const targetCarbs = (requiredTargetAmount / 100) * targetFood.carbs;
                const targetFat = (requiredTargetAmount / 100) * targetFood.fat;
                
                comparisonResultDiv.innerHTML = `
                    <p class="text-sm text-slate-300 mb-3 leading-relaxed">
                        במקום <span class="font-bold text-blue-400">${sourceAmount.toFixed(0)} גרם</span> של ${sourceFoodKey},<br>
                        יש לאכול <span class="font-bold text-emerald-400 text-lg">${requiredTargetAmount.toFixed(0)} גרם</span> של ${targetFoodKey}.
                    </p>
                    <div class="bg-slate-900 p-3 rounded-lg text-right">
                        <div class="flex justify-between items-center text-xs border-b border-slate-800 pb-1 mb-1">
                            <span class="text-slate-400">קלוריות:</span><span class="font-bold text-slate-200">${targetCalories.toFixed(0)}</span>
                        </div>
                        <div class="flex justify-between items-center text-xs border-b border-slate-800 pb-1 mb-1">
                            <span class="text-slate-400">חלבון:</span><span class="font-bold text-red-400">${targetProtein.toFixed(1)}g</span>
                        </div>
                        <div class="flex justify-between items-center text-xs border-b border-slate-800 pb-1 mb-1">
                            <span class="text-slate-400">פחמימה:</span><span class="font-bold text-emerald-400">${targetCarbs.toFixed(1)}g</span>
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="text-slate-400">שומן:</span><span class="font-bold text-amber-400">${targetFat.toFixed(1)}g</span>
                        </div>
                    </div>
                `;
                comparisonResultDiv.classList.remove('hidden');
            };

            [sourceFoodSelect, targetFoodSelect, sourceAmountInput, matchCriteriaSelect].forEach(el => {
                el.addEventListener('change', calculate);
                el.addEventListener('keyup', calculate);
            });
        }

        // --- אתחול הגרפים ---
        function initCharts() {
            chartsInstance.forEach(chart => chart.destroy());
            chartsInstance = [];

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'Assistant, sans-serif';

            if (progressData.strength.length > 0) {
                const ctxStrength = document.getElementById('strengthChart').getContext('2d');
                
                // סינון תרגילים שיש להם משמעות בגרף (לא אפסים מהתחלה ועד הסוף)
                const chartData = progressData.strength.filter(d => d.prev > 0 || d.current > 0);

                const strengthChart = new Chart(ctxStrength, {
                    type: 'bar',
                    data: {
                        labels: chartData.map(d => d.exercise),
                        datasets: [
                            {
                                label: 'משקל התחלה',
                                data: chartData.map(d => d.prev),
                                backgroundColor: '#475569',
                                borderRadius: 4
                            },
                            {
                                label: 'שיא נוכחי (PR)',
                                data: chartData.map(d => d.current),
                                backgroundColor: '#3b82f6',
                                borderRadius: 4
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top', labels: { color: '#e2e8f0', font: {size: 11} } },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) { label += ': '; }
                                        if (context.parsed.x !== null) {
                                            label += context.parsed.x + ' ק"ג';
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { grid: { color: '#334155', drawBorder: false }, ticks: { font: {size: 10} } },
                            y: { grid: { display: false, drawBorder: false }, ticks: { font: {size: 10} } }
                        }
                    }
                });
                chartsInstance.push(strengthChart);
            }
        }

        // --- הרינדור הראשי ---
        function render() {
            const root = document.getElementById('app-root');
            
            let mainContent = '';
            if (activeTab === 'workouts') mainContent = renderWorkouts();
            else if (activeTab === 'nutrition') mainContent = renderNutrition();
            else if (activeTab === 'progress') mainContent = renderProgress();
            else if (activeTab === 'videos') mainContent = renderVideos();

            root.innerHTML = `
                ${renderHeader()}
                <main class="max-w-md mx-auto p-4 pb-24">
                    ${mainContent}
                </main>
            `;

            lucide.createIcons();

            if (activeTab === 'progress') {
                initCharts();
                updateExerciseDetails(selectedProgressExercise);
            }
            if (activeTab === 'nutrition') {
                initCalculator();
            }
        }

        // --- הפעלה ראשונית של האפליקציה ---
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
